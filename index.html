<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Torneo Smash Bros - Estadísticas</title>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <script type="text/javascript">
        google.charts.load("current", { packages: ["corechart"] });
        google.charts.setOnLoadCallback(drawChart);

        function drawChart() {
            var data = google.visualization.arrayToDataTable([
                ['Jugador', 'Puntos'],
                ['Vid', 18],
                ['Bulbamaster', 16],
                ['Kube', 14],
                ['PokeHugo', 11],
                ['ALPOH!', 10],
                ['Sir Nacho', 8],
                ['El retirado', 8],
                ['Millan', 7],
                ['Slogan', 7],
                ['Elllamoga', 6],
                ['Conejito', 6],
                //['TheLog!!', 5],
                //['Gatobufanda', 4],
                //['Manuel', 4],
                //['Safary', 4],
                //['Edgy AF', 4],
                //['Gallade', 4],
                //['Code_FDox', 3],
                //['elmatabuelas3000', 3],
                //['Xevii', 3],
                //['GBlime', 3],
                //['Ice Roxx', 3],
                //['FCarrim', 2],
                //['Macheteke', 2],
                //['Garci115', 2],
                //['Swergo', 2],
                //['Raimon', 2],
                //['Noraah', 1],
                //['Alex', 1],
                //['Guila', 1],
                //['ElParcero', 1],
                //['Driio', 1],
                //['Sorakamui', 1]
            ]);

            var options = {
                title: 'Top 10 Season 2 de Comarca SmashWorld: Face-To-Face',
                pieHole: 0.4,
                pieSliceText: 'value', // 👈 Esto muestra los puntos en lugar del porcentaje
                pieSliceTextStyle: {
                    fontSize: 14
                },
                tooltip: {
                    trigger: 'focus',
                    text: 'both' // Muestra tanto nombre como valor al pasar el cursor
                },
                colors: ['#3366CC', '#DC3912', '#FF9900', '#109618', '#990099', '#0099C6'],
                backgroundColor: '#f9f9f9',
                titleTextStyle: {
                    fontSize: 20,
                    bold: true
                }
            };

            var chart = new google.visualization.PieChart(document.getElementById('donutchart'));
            chart.draw(data, options);
        }
    </script>
</head>

<body style="font-family: Arial, sans-serif; background-color: #f0f0f0; padding: 40px;">
    <h1 style="text-align:center;">Acumulación de puntos del Top 10 de Torrevieja</h1>
    <div id="donutchart" style="width: 900px; height: 500px; margin: auto;"></div>

</html>
